name               = "blackroad-worker-health"
main               = "src/index.js"
compatibility_date = "2024-12-01"
account_id         = "848cf0b18d51e0170e0d1537aec3505a"

[vars]
INSTANCE = "worker-health"

# Secrets (set via: wrangler secret put SECRET_NAME)
# AUTH_TOKEN           — bearer token for admin endpoints
# CLOUDFLARE_API_TOKEN — CF API token for worker listing

[[kv_namespaces]]
binding = "HEALTH"
id      = "PLACEHOLDER_KV_ID"

[triggers]
crons = ["*/10 * * * *"]

name               = "blackroad-backgrounds"
main               = "src/index.js"
compatibility_date = "2024-12-01"
account_id         = "848cf0b18d51e0170e0d1537aec3505a"

[vars]
INSTANCE = "blackroad-backgrounds"
# Google Drive folder ID containing sprite/photo backgrounds
# GOOGLE_DRIVE_FOLDER_ID = "your-folder-id-here"

# Set secrets via: wrangler secret put GOOGLE_API_KEY
# GOOGLE_API_KEY — Google Cloud API key with Drive API enabled (read-only)

[[kv_namespaces]]
binding = "BG_CACHE"
# The KV namespace ID for BG_CACHE must be set per environment in the
# corresponding Wrangler config file (e.g., wrangler.dev.toml, wrangler.prod.toml).
# Example (in an env-specific file):
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

name               = "blackroad-stripe"
main               = "src/index.js"
compatibility_date = "2024-12-01"
account_id         = "848cf0b18d51e0170e0d1537aec3505a"

[vars]
INSTANCE            = "blackroad-stripe"
SUCCESS_URL         = "https://pay.blackroad.io/success"
CANCEL_URL          = "https://pay.blackroad.io/cancel"
PORTAL_RETURN_URL   = "https://pay.blackroad.io/"
PI_WEBHOOK_ENDPOINT = "http://192.168.4.64:8080/webhooks/stripe"

# Set secrets via:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_PRICE_PRO_MONTHLY
#   wrangler secret put STRIPE_PRICE_PRO_YEARLY
#   wrangler secret put STRIPE_PRICE_ENT_MONTHLY
#   wrangler secret put STRIPE_PRICE_ENT_YEARLY

[[kv_namespaces]]
binding = "STRIPE_EVENTS"
id      = "PLACEHOLDER_KV_ID"

name               = "blackroad-tunnel-proxy"
main               = "src/index.js"
compatibility_date = "2024-12-01"
account_id         = "848cf0b18d51e0170e0d1537aec3505a"

[vars]
INSTANCE = "tunnel-proxy"

# Secrets (set via: wrangler secret put SECRET_NAME)

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoadVerse | BlackRoad OS Metaverse</title>
    <meta name="description" content="RoadVerse - The BlackRoad OS Metaverse Platform. Explore 14 zones, meet AI agents, build worlds, and experience VR." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; transition: opacity 0.5s;
      }
      #loading-screen .logo {
        font-size: 3rem; font-weight: 800; letter-spacing: -1px;
        background: linear-gradient(135deg, #F5A623 0%, #FF1D6C 38.2%, #9C27B0 61.8%, #2979FF 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; margin-bottom: 24px;
      }
      #loading-screen .bar-track {
        width: 240px; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden;
      }
      #loading-screen .bar-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #F5A623, #FF1D6C, #9C27B0, #2979FF);
        animation: load-bar 2s ease-in-out forwards;
      }
      @keyframes load-bar { to { width: 100%; } }
      #loading-screen .status {
        margin-top: 16px; color: #555; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="logo">ROADVERSE</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status">Initializing metaverse engine...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

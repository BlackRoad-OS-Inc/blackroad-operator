name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 4 * * *' # Daily 4 AM UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Custom Secret Patterns Scan
        run: |
          echo "🔍 Scanning for BlackRoad-specific secret patterns..."
          FOUND=0

          # Patterns to scan for (excluding safe files)
          PATTERNS=(
            'ANTHROPIC_API_KEY[[:space:]]*=[[:space:]]*["'"'"']?sk-'
            'OPENAI_API_KEY[[:space:]]*=[[:space:]]*["'"'"']?sk-'
            'CLOUDFLARE_API_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?[a-zA-Z0-9_-]{40}'
            'RAILWAY_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?[a-f0-9-]{36}'
            'VERCEL_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?[a-zA-Z0-9]{24}'
            'DIGITALOCEAN_ACCESS_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?dop_'
            'HUGGINGFACE_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?hf_'
            'STRIPE_API_KEY[[:space:]]*=[[:space:]]*["'"'"']?sk_'
            'SENDGRID_API_KEY[[:space:]]*=[[:space:]]*["'"'"']?SG\.'
            'SLACK_TOKEN[[:space:]]*=[[:space:]]*["'"'"']?xox[bpoas]-'
            'JWT_SECRET[[:space:]]*=[[:space:]]*["'"'"']?[a-zA-Z0-9+/=]{32,}'
            'NEXTAUTH_SECRET[[:space:]]*=[[:space:]]*["'"'"']?[a-zA-Z0-9+/=]{32,}'
            'DATABASE_URL[[:space:]]*=[[:space:]]*["'"'"']?postgres(ql)?://'
            'PRIVATE[_ ]KEY[[:space:]]*=[[:space:]]*["'"'"']?-----BEGIN'
            'ghp_[a-zA-Z0-9]{36}'
            'gho_[a-zA-Z0-9]{36}'
            'ghs_[a-zA-Z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
          )

          EXCLUDE_DIRS="--exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next --exclude-dir=__pycache__"
          EXCLUDE_FILES="--exclude=*.example --exclude=*.sample --exclude=*.template --exclude=CLAUDE.md --exclude=SECURITY.md --exclude=*.yml --exclude=*.yaml --exclude=security-scan.yml"

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn $EXCLUDE_DIRS $EXCLUDE_FILES -E "$pattern" . 2>/dev/null | grep -v '.env.example' | head -20)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  Pattern match: $pattern"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -gt 0 ]; then
            echo "::warning::Found $FOUND potential secret patterns"
          else
            echo "✅ No secrets detected"
          fi

  dependency-audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: NPM Audit
        run: |
          echo "🔍 Running npm audit..."
          npm audit --json 2>/dev/null | tee /tmp/npm-audit.json || true

          # Parse and display summary
          CRITICAL=$(cat /tmp/npm-audit.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "0")
          HIGH=$(cat /tmp/npm-audit.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "0")

          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL critical vulnerabilities found"
          fi
        continue-on-error: true

      - name: Python Safety Check
        run: |
          if [ -f requirements.txt ] || [ -f mcp-bridge/requirements.txt ]; then
            pip install safety 2>/dev/null || true
            for req_file in requirements.txt mcp-bridge/requirements.txt; do
              if [ -f "$req_file" ]; then
                echo "🔍 Scanning $req_file..."
                safety check -r "$req_file" 2>/dev/null || echo "⚠️ Issues found in $req_file"
              fi
            done
          fi
        continue-on-error: true

  license-compliance:
    name: License Compliance
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for prohibited licenses
        run: |
          echo "🔍 Checking license compliance..."

          # Verify proprietary license is present
          if [ -f LICENSE ]; then
            if grep -qi "proprietary\|blackroad os" LICENSE; then
              echo "✅ Proprietary license present"
            else
              echo "::warning::LICENSE file may not reflect proprietary status"
            fi
          else
            echo "::warning::No LICENSE file found"
          fi

          # Check for accidentally included copyleft dependencies
          if [ -f package-lock.json ]; then
            COPYLEFT=$(grep -c '"license": "GPL\|"license": "AGPL\|"license": "SSPL' package-lock.json 2>/dev/null || echo "0")
            if [ "$COPYLEFT" -gt 0 ]; then
              echo "::warning::Found $COPYLEFT potentially copyleft-licensed dependencies"
            else
              echo "✅ No copyleft licenses detected in dependencies"
            fi
          fi

  sast-shellcheck:
    name: Shell Script Security
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          fi

      - name: Scan shell scripts for security issues
        run: |
          echo "🔍 Scanning shell scripts for security issues..."
          ISSUES=0

          # Check for command injection patterns
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./orgs/*" | while read script; do
            # ShellCheck with security focus
            shellcheck -S error "$script" 2>/dev/null || ISSUES=$((ISSUES + 1))
          done

          # Check for unsafe patterns
          UNSAFE_PATTERNS=(
            'eval[[:space:]]'
            'curl.*\|[[:space:]]*sh'
            'curl.*\|[[:space:]]*bash'
            'wget.*\|[[:space:]]*sh'
          )

          for pattern in "${UNSAFE_PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.sh" -E "$pattern" . 2>/dev/null | grep -v node_modules | grep -v .git | head -10)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ Potentially unsafe pattern '$pattern':"
              echo "$MATCHES"
            fi
          done

          echo "✅ Shell security scan complete"
        continue-on-error: true

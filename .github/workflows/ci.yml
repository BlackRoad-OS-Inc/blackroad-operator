name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --omit=dev || true
      - name: Scan for hardcoded secrets
        run: |
          FOUND=0
          if grep -rn --include="*.ts" --include="*.js" \
            -E "(password|secret|api_key|private_key)\s*[:=]\s*['\"][A-Za-z0-9+/=]{8,}['\"]" \
            src/ 2>/dev/null | grep -v node_modules | grep -v '\.test\.'; then
            echo "::warning::Potential hardcoded secrets detected in source files"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Review flagged files for hardcoded credentials"
            exit 1
          fi

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on key scripts
        run: |
          SCRIPTS=""
          for f in br health.sh status.sh agent.sh boot.sh; do
            [ -f "$f" ] && SCRIPTS="$SCRIPTS $f"
          done
          if [ -n "$SCRIPTS" ]; then
            shellcheck --severity=warning $SCRIPTS 2>&1 | head -100 || true
          fi

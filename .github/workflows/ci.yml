name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck (ARM64 compatible)
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          fi
          shellcheck --version | head -2
      - name: ShellCheck all scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" | \
            xargs shellcheck --severity=warning 2>&1 | head -50 || echo "⚠️ shellcheck warnings above"
        continue-on-error: true

  test:
    name: Tests
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx prettier --check .
      - name: Unit tests
        run: npm test
      - name: Gateway tests
        run: node blackroad-core/tests/gateway.test.js
      - name: Check br script syntax
        run: zsh -n br

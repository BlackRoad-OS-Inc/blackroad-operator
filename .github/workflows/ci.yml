name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Check br script syntax
        run: |
          [ -f br ] && bash -n br && echo "br script syntax OK" || echo "br not found"
        continue-on-error: true

  shellcheck:
    name: ShellCheck
    runs-on: [self-hosted, linux, arm64, blackroad]
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck (ARM64 compatible)
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          fi
          shellcheck --version | head -2
      - name: ShellCheck all scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" -print0 | \
            xargs -0 shellcheck --severity=warning 2>&1 | head -100 || true
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: [self-hosted, linux, arm64, blackroad]
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t blackroad-operator:test .

      - name: Smoke test container
        run: |
          docker run -d --name test-operator -p 8080:8080 blackroad-operator:test
          sleep 3
          curl -sf http://localhost:8080/healthz | grep -q '"status":"ok"'
          docker stop test-operator
          docker rm test-operator
        continue-on-error: true

  deploy-railway:
    name: Deploy to Railway
    runs-on: [self-hosted, linux, arm64, blackroad]
    needs: [build-and-test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

  deploy-workers:
    name: Deploy Cloudflare Workers
    runs-on: [self-hosted, linux, arm64, blackroad]
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Deploy auth worker
        working-directory: workers/auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
        continue-on-error: true

      - name: Deploy API worker
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
        continue-on-error: true

      - name: Deploy email worker
        working-directory: workers/email
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
        continue-on-error: true

      - name: Deploy copilot-cli worker
        working-directory: workers/copilot-cli
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
        continue-on-error: true

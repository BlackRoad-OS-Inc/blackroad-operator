name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          fi
          shellcheck --version | head -2
      - name: ShellCheck all scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" \
            -not -path "./orgs/*" -not -path "./blackroad-sf/*" | \
            xargs shellcheck --severity=warning 2>&1 | head -50 || echo "shellcheck warnings above"
        continue-on-error: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Check br script syntax
        run: |
          [ -f br ] && bash -n br && echo "br script syntax OK" || echo "br not found"
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Prettier check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts" "*.json" "*.ts"

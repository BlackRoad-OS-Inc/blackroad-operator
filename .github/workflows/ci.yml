name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck-and-test:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI entry point
        run: node dist/bin/br.js --version

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run lint

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on key scripts
        run: |
          SCRIPTS=$(find . -maxdepth 2 -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./orgs/*")
          if [ -n "$SCRIPTS" ]; then
            echo "$SCRIPTS" | xargs shellcheck --severity=warning 2>&1 || true
          else
            echo "No scripts found at root level"
          fi

name: Release

on:
  push:
    tags: ['v*']

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - name: Security audit
        # Allow pipeline to continue so we can ship critical fixes, but surface findings.
        # TODO: switch to `npm audit --omit=dev` (fail on critical) once existing advisories are resolved.
        run: npm audit --omit=dev || echo "::warning::npm audit found vulnerabilities — review before next release"

  release:
    name: Release
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          generate_release_notes: true
